name: Build and Release GO package

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*' # Triggers the workflow when you push a tag like v1.0.0, v2.1.3, etc.
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write # Crucial: Allows the workflow to create releases and upload assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Install go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Build executable binary for Linux (ELF)
      run: GOOS=linux GOARCH=amd64 go build -o hamacmonitor-linux
      
    - name: Build executable binary for Macos
      run: GOOS=darwin GOARCH=arm64 go build -o hamacmonitor-mac

    - name: Create Release and Upload Assets
      # This step ONLY runs if the push was a git tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          hamacmonitor-linux
          hamacmonitor-mac
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
